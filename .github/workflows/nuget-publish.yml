name: Build, Test, and Publish NuGet

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request: 
jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install NPM Packages
      working-directory: ./FeatureManagement.Dashboard/client-app
      run: npm ci
    - name: Run React Tests with Coverage (Vitest)
      working-directory: ./FeatureManagement.Dashboard/client-app
      run: npm run test:coverage
    - name: Upload React Coverage Artifact
      uses: actions/upload-artifact@v4
      with:
        name: react-coverage
        path: FeatureManagement.Dashboard/client-app/coverage
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
    - name: Restore .NET Dependencies
      run: dotnet restore
    - name: Build .NET Solution
      run: dotnet build --no-restore --configuration Release
    - name: Run C# Tests with Coverage (xUnit)
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults
    - name: Upload .NET Coverage Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-coverage
        path: TestResults
      
  publish:
    needs: build-test-publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: 
          dotnet-version: '10.x'   
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Restore .NET Dependencies
        run: dotnet restore ./FeatureManagement.Dashboard/FeatureManagement.Dashboard.csproj
      - name: Build NuGet Project
        run: dotnet build ./FeatureManagement.Dashboard/FeatureManagement.Dashboard.csproj --configuration Release --no-restore
      - name: Pack NuGet Package
        run: dotnet pack ./FeatureManagement.Dashboard/FeatureManagement.Dashboard.csproj --configuration Release --no-restore --output ./nupkgs
      - name: Validate NuGet Package Metadata
        shell: bash
        run: |
          set -euo pipefail

          pkg_path=$(ls ./nupkgs/*.nupkg | head -n 1)
          nuspec_name="FeatureManagement.Dashboard.nuspec"

          unzip -p "$pkg_path" "$nuspec_name" > ./nupkgs/package.nuspec

          # Ensure no internal split-package dependencies are emitted.
          if grep -q "FeatureManagement.Dashboard.Infrastructure\|FeatureManagement.Dashboard.Models\|FeatureManagement.Dashboard.Persistence" ./nupkgs/package.nuspec; then
            echo "Internal package dependency detected in nuspec."
            cat ./nupkgs/package.nuspec
            exit 1
          fi

          # Ensure required assemblies are included in the published package.
          unzip -l "$pkg_path" > ./nupkgs/package-files.txt
          grep -q "lib/net10.0/FeatureManagement.Dashboard.dll" ./nupkgs/package-files.txt
          grep -q "lib/net10.0/FeatureManagement.Dashboard.Infrastructure.dll" ./nupkgs/package-files.txt
          grep -q "lib/net10.0/FeatureManagement.Dashboard.Models.dll" ./nupkgs/package-files.txt
          grep -q "lib/net10.0/FeatureManagement.Dashboard.Persistence.dll" ./nupkgs/package-files.txt

          # SPA files are embedded into FeatureManagement.Dashboard.dll, not packed as loose files.
          test -f ./FeatureManagement.Dashboard/client-app/dist/index.html
      - name: Push to NuGet.org
        env:
          SECRET: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key "$SECRET" --source https://api.nuget.org/v3/index.json --skip-duplicate